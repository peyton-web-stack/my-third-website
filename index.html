<!DOCTYPE html>
<html>
<head>
  <style>
    .container {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    }
    .box {
      border: 2px solid black;
      padding: 20px;
    }
    .box1 {
      grid-column: span 2;
    }
  </style>
</head>

<body>
  <div class="container">
    <div class="box box1">Box 1</div>
    <div class="box">Box 2</div>
    <div class="box">Box 3</div>
  </div>
</body
</html>
